name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android-apk-release:
    name: Build and publish Android APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Ensure tag commit is on master
        run: |
          set -euo pipefail
          git fetch origin master
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build signed release APKs
        run: ./gradlew --no-configuration-cache :androidApp:assembleRelease

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp androidApp/build/outputs/apk/release/*.apk "release-assets/v2v-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*.apk
